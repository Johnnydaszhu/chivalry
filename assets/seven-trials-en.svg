<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Seven Trials</title>
  <desc id="desc">A simplified English chart of the seven trials.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ecdf"/>
      <stop offset="100%" stop-color="#e4d7bf"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#343434"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <style>
      .title { font: 700 30px Georgia, 'Times New Roman', serif; fill: #181818; letter-spacing: 2px; }
      .cardnum { font: 700 16px Georgia, 'Times New Roman', serif; fill: #8d6f3d; }
      .cardlabel { font: 700 24px Georgia, 'Times New Roman', serif; fill: #181818; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="120" y="56" width="960" height="1088" rx="8" fill="none" stroke="#181818" stroke-width="3"/>
  <rect x="150" y="86" width="900" height="1028" rx="6" fill="none" stroke="#9b7b45" stroke-width="2"/>

  <circle cx="600" cy="138" r="40" fill="url(#seal)" stroke="#9b7b45" stroke-width="3"/>
  <path d="M600 104 L612 124 L600 188 L588 124 Z" fill="#d9bf86"/>
  <text x="600" y="220" text-anchor="middle" class="title">SEVEN TRIALS</text>

  <g>
    <rect x="300" y="272" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="306" class="cardnum">I</text>
    <text x="600" y="325" text-anchor="middle" class="cardlabel">Oath</text>
  </g>
  <g>
    <rect x="300" y="390" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="424" class="cardnum">II</text>
    <text x="600" y="443" text-anchor="middle" class="cardlabel">Courage</text>
  </g>
  <g>
    <rect x="300" y="508" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="542" class="cardnum">III</text>
    <text x="600" y="561" text-anchor="middle" class="cardlabel">Mercy</text>
  </g>
  <g>
    <rect x="300" y="626" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="660" class="cardnum">IV</text>
    <text x="600" y="679" text-anchor="middle" class="cardlabel">Courtesy</text>
  </g>
  <g>
    <rect x="300" y="744" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="778" class="cardnum">V</text>
    <text x="600" y="797" text-anchor="middle" class="cardlabel">Protection</text>
  </g>
  <g>
    <rect x="300" y="862" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="896" class="cardnum">VI</text>
    <text x="600" y="915" text-anchor="middle" class="cardlabel">Honor</text>
  </g>
  <g>
    <rect x="300" y="980" width="600" height="88" rx="10" fill="#f8f2e6" stroke="#9b7b45" stroke-width="2"/>
    <text x="338" y="1014" class="cardnum">VII</text>
    <text x="600" y="1033" text-anchor="middle" class="cardlabel">Measure</text>
  </g>
</svg>
