<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">七重试炼 / Seven Trials</title>
  <desc id="desc">An iron-law codex diagram showing seven trials arranged around a central judicial blade: Oath, Courage, Mercy, Courtesy, Protection, Honor, and Measure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0b0d"/>
      <stop offset="100%" stop-color="#17171b"/>
    </linearGradient>
    <linearGradient id="parchment" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4ead5"/>
      <stop offset="100%" stop-color="#dfcfaa"/>
    </linearGradient>
    <linearGradient id="iron" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4b4d54"/>
      <stop offset="50%" stop-color="#1a1b20"/>
      <stop offset="100%" stop-color="#5d6067"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 54px Georgia, 'Times New Roman', serif; fill: #efe3c3; letter-spacing: 2px; }
      .subtitle { font: 600 20px Georgia, 'Times New Roman', serif; fill: #bfa978; letter-spacing: 3px; }
      .label { font: 700 28px Georgia, 'Times New Roman', serif; fill: #181514; letter-spacing: 1px; }
      .cn { font: 700 18px Georgia, 'Times New Roman', serif; fill: #6b5529; letter-spacing: 1px; }
      .body { font: 400 17px Georgia, 'Times New Roman', serif; fill: #2f2924; }
      .small { font: 600 16px Georgia, 'Times New Roman', serif; fill: #bfa978; letter-spacing: 2px; }
      .footer { font: 400 20px Georgia, 'Times New Roman', serif; fill: #d5c8a8; }
    </style>
  </defs>

  <rect width="1200" height="1500" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="1432" rx="20" fill="none" stroke="#7b6330" stroke-width="2"/>
  <rect x="54" y="54" width="1092" height="1392" rx="16" fill="none" stroke="#2b2b30" stroke-width="2"/>

  <text x="600" y="110" text-anchor="middle" class="title">七重试炼</text>
  <text x="600" y="148" text-anchor="middle" class="subtitle">THE SEVEN TRIALS OF THE IRON LAW</text>
  <text x="600" y="196" text-anchor="middle" class="small">EVERY DEED MUST PASS THE BLADE OF JUDGMENT</text>

  <g opacity="0.2" filter="url(#glow)">
    <circle cx="600" cy="760" r="210" fill="#8c6b2c"/>
  </g>

  <g>
    <rect x="564" y="260" width="72" height="1000" rx="20" fill="url(#iron)" stroke="#9f8450" stroke-width="2"/>
    <path d="M600 232 L636 288 H564 Z" fill="#d6c087" stroke="#9f8450" stroke-width="2"/>
    <path d="M564 1260 L636 1260 L600 1370 Z" fill="#c1aa74" stroke="#9f8450" stroke-width="2"/>
    <rect x="528" y="690" width="144" height="140" rx="16" fill="#141418" stroke="#9f8450" stroke-width="2"/>
    <circle cx="600" cy="760" r="44" fill="none" stroke="#d6bf88" stroke-width="3"/>
    <path d="M600 716 L613 747 L646 747 L619 767 L630 800 L600 780 L570 800 L581 767 L554 747 L587 747 Z" fill="#d6bf88"/>
  </g>

  <g>
    <line x1="600" y1="360" x2="450" y2="360" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="360" r="10" fill="#d6bf88"/>
    <rect x="96" y="284" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="114" y="302" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="154" cy="360" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="154" y="366" text-anchor="middle" class="small">I</text>
    <text x="194" y="340" class="label">Oath</text>
    <text x="194" y="364" class="cn">誓约</text>
    <text x="194" y="392" class="body">Keep the sworn word, the given duty, and the</text>
    <text x="194" y="414" class="body">obligation your conduct itself has created.</text>
  </g>

  <g>
    <line x1="600" y1="500" x2="750" y2="500" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="500" r="10" fill="#d6bf88"/>
    <rect x="750" y="424" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="768" y="442" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="1046" cy="500" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="1046" y="506" text-anchor="middle" class="small">II</text>
    <text x="790" y="480" class="label">Courage</text>
    <text x="790" y="504" class="cn">勇毅</text>
    <text x="790" y="532" class="body">Face the rightful burden instead of fleeing into</text>
    <text x="790" y="554" class="body">delay, silence, excuse, or ornamental bravado.</text>
  </g>

  <g>
    <line x1="600" y1="640" x2="450" y2="640" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="640" r="10" fill="#d6bf88"/>
    <rect x="96" y="564" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="114" y="582" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="154" cy="640" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="154" y="646" text-anchor="middle" class="small">III</text>
    <text x="194" y="620" class="label">Mercy</text>
    <text x="194" y="644" class="cn">悯恕</text>
    <text x="194" y="672" class="body">Refuse needless cruelty, humiliation, and the</text>
    <text x="194" y="694" class="body">small delight of making another kneel.</text>
  </g>

  <g>
    <line x1="600" y1="780" x2="750" y2="780" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="780" r="10" fill="#d6bf88"/>
    <rect x="750" y="704" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="768" y="722" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="1046" cy="780" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="1046" y="786" text-anchor="middle" class="small">IV</text>
    <text x="790" y="760" class="label">Courtesy</text>
    <text x="790" y="784" class="cn">礼度</text>
    <text x="790" y="812" class="body">Preserve dignity, especially in public, where</text>
    <text x="790" y="834" class="body">truth without form becomes theater.</text>
  </g>

  <g>
    <line x1="600" y1="920" x2="450" y2="920" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="920" r="10" fill="#d6bf88"/>
    <rect x="96" y="844" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="114" y="862" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="154" cy="920" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="154" y="926" text-anchor="middle" class="small">V</text>
    <text x="194" y="900" class="label">Protection</text>
    <text x="194" y="924" class="cn">守护</text>
    <text x="194" y="952" class="body">Stand where the more exposed person is struck;</text>
    <text x="194" y="974" class="body">do not borrow their danger for your vanity.</text>
  </g>

  <g>
    <line x1="600" y1="1060" x2="750" y2="1060" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="1060" r="10" fill="#d6bf88"/>
    <rect x="750" y="984" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="768" y="1002" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="1046" cy="1060" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="1046" y="1066" text-anchor="middle" class="small">VI</text>
    <text x="790" y="1040" class="label">Honor</text>
    <text x="790" y="1064" class="cn">荣名</text>
    <text x="790" y="1092" class="body">Act openly and fairly; a deed does not become</text>
    <text x="790" y="1114" class="body">noble because its cheap trick is concealed.</text>
  </g>

  <g>
    <line x1="600" y1="1200" x2="450" y2="1200" stroke="#a7894f" stroke-width="3"/>
    <circle cx="600" cy="1200" r="10" fill="#d6bf88"/>
    <rect x="96" y="1124" width="354" height="152" rx="18" fill="url(#iron)" stroke="#856a37" stroke-width="2"/>
    <rect x="114" y="1142" width="318" height="116" rx="12" fill="url(#parchment)"/>
    <circle cx="154" cy="1200" r="28" fill="#18191d" stroke="#a7894f" stroke-width="2"/>
    <text x="154" y="1206" text-anchor="middle" class="small">VII</text>
    <text x="194" y="1180" class="label">Measure</text>
    <text x="194" y="1204" class="cn">节制</text>
    <text x="194" y="1232" class="body">Restrain appetite, ego, and retaliatory heat, lest</text>
    <text x="194" y="1254" class="body">power turn from discipline into spectacle.</text>
  </g>

  <text x="600" y="1440" text-anchor="middle" class="footer">A deed that fails the trials is not absolved by intention.</text>
</svg>
